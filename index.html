                // گوش دادن به تغییرات محصولات در دیتابیس شما
                onSnapshot(collection(db, 'darbari_products'), (snap) => {
                    window.dbProducts = snap.docs.map(d => ({ fbId: d.id, ...d.data() }));
                    
                    // مخفی کردن لودینگ
                    document.getElementById('loader').style.opacity = '0';
                    setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
                    
                    renderAll();
                }, (error) => {
                    console.error("خطا در دریافت محصولات: قوانین دیتابیس (Rules) را چک کنید", error);
                    alert("خطا در اتصال به دیتابیس. لطفا قدم اول (تنظیم Rules) را انجام دهید.");
                });

                // گوش دادن به تغییرات لینک‌های ارتباطی
                onSnapshot(doc(db, 'darbari_settings', 'links'), (snap) => {
                    if(snap.exists()) {
                        window.dbSettings = snap.data();
                    }
                    renderAll();
                });

            } catch(e) {
                console.error("اتصال به فایربیس برقرار نشد:", e);
                alert("ارتباط با سرور برقرار نشد.");
            }
        }

        function renderAll() {
            setLang(window.lang);
            if(window.currentCatId) renderProducts(window.currentCatId);
            if(document.getElementById('admin-view').classList.contains('cat-active')) renderAdmin();
        }

        // UI HELPERS
        window.haptic = (ms) => { if(navigator.vibrate) navigator.vibrate(ms); }
        window.formatPrice = (n) => n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");

        window.setLang = (code) => {
            window.lang = code;
            const d = dict[code];
            document.documentElement.dir = d.dir;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${code}`).classList.add('active');
            document.getElementById('b-title').innerText = d.brand;
            document.getElementById('b-sub').innerText = d.sub;
            document.getElementById('about-btn-text').innerText = d.ui.about;
            document.getElementById('about-desc').innerText = d.ui.desc;
            document.getElementById('cart-title').innerText = d.ui.cart;
            document.getElementById('cart-total-label').innerText = d.ui.total;
            renderCategories();
        }

        window.renderCategories = () => {
            const container = document.getElementById('cats-container');
            container.innerHTML = '';
            const d = dict[window.lang].cats;
            for(let id in d) {
                container.innerHTML += `
                    <div class="glass-card" onclick="openCat('${id}')">
                        <div class="cat-info">
                            <div class="cat-title">${d[id].t}</div>
                            <div class="cat-sub">${d[id].s}</div>
                        </div>
                        <div class="cat-icon">${d[id].i}</div>
                    </div>
                `;
            }
        }

        window.renderProducts = (catId) => {
            const list = document.getElementById('product-list');
            list.innerHTML = '';
            const d = dict[window.lang];
            const items = window.dbProducts.filter(p => p.cat === catId);
            
            if(items.length === 0) { 
                list.innerHTML = `<p style="text-align:center; opacity:0.5; padding:20px;">${d.ui.empty}</p>`; 
                return; 
            }
            
            items.forEach(p => {
                const name = p[window.lang] || p.fa;
                const img = p.img ? `<img src="${p.img}" style="width:100%; height:100%; object-fit:cover;">` : d.cats[catId].i;
                list.innerHTML += `
                    <div class="product-item ${!p.avail ? 'unavailable' : ''}" onclick="openProduct('${p.fbId}')">
                        <div class="p-img-box" style="${p.img ? 'padding:0;' : ''}">${img}</div>
                        <div class="p-meta">
                            <div class="p-name">${name}</div>
                            <div class="p-price">${window.formatPrice(p.price)} ${d.ui.curr}</div>
                        </div>
                        ${!p.avail ? `<span style="color:#ff453a; font-size:0.8rem; font-weight:bold;">${d.ui.unavail}</span>` : ''}
                    </div>
                `;
            });
        }

        window.openCat = (id) => {
            haptic(15);
            window.currentCatId = id;
            document.getElementById('blob1').style.background = dict[window.lang].cats[id].c;
            document.getElementById('view-title').innerText = dict[window.lang].cats[id].t;
            document.getElementById('home-view').className = 'page-view home-inactive';
            document.getElementById('cat-view').className = 'page-view cat-active';
            renderProducts(id);
        }

        window.goHome = () => {
            haptic(10);
            window.currentCatId = null;
            document.getElementById('blob1').style.background = 'var(--gold)';
            document.getElementById('home-view').className = 'page-view home-active';
            document.getElementById('cat-view').className = 'page-view cat-hidden';
        }

        window.openProduct = (fbId) => {
            const p = window.dbProducts.find(x => x.fbId === fbId);
            if(!p || !p.avail) return;
            window.currentProduct = p;
            document.getElementById('m-icon').innerHTML = p.img ? `<img src="${p.img}" style="width:100%; height:100%; object-fit:cover;">` : dict[window.lang].cats[p.cat].i;
            document.getElementById('m-name').innerText = p[window.lang] || p.fa;
            document.getElementById('m-price').innerText = window.formatPrice(p.price) + " " + dict[window.lang].ui.curr;
            document.getElementById('m-desc').innerText = p.desc || '';
            document.getElementById('add-cart-btn').innerText = dict[window.lang].ui.add;
            toggleModal('p-modal', true);
        }

        // CART
        window.addToCart = () => {
            window.cart.push(window.currentProduct);
            updateCartUI();
            toggleModal('p-modal', false);
            haptic([15, 30]);
        }

        window.updateCartUI = () => {
            document.getElementById('cart-count').innerText = window.cart.length;
            const container = document.getElementById('cart-items-container');
            container.innerHTML = '';
            let total = 0;
            window.cart.forEach((item) => {
                total += item.price;
                container.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.1);"><span>${item[window.lang] || item.fa}</span><span>${window.formatPrice(item.price)}</span></div>`;
            });
            document.getElementById('cart-total').innerText = window.formatPrice(total);
        }

        window.openCartModal = () => { if(window.cart.length > 0) toggleModal('cart-modal', true); }
        window.finishOrder = () => { alert(dict[window.lang].ui.success); window.cart = []; updateCartUI(); toggleModal('cart-modal', false); }

        // ADMIN
        window.handleSecretClick = () => {
            secretClicks++;
            clearTimeout(secretTimer);
            if(secretClicks >= 2) { toggleModal('admin-login-modal', true); secretClicks = 0; }
            else { secretTimer = setTimeout(() => secretClicks = 0, 800); }
        }

        window.verifyAdmin = () => {
            if(document.getElementById('admin-password').value === "2066") { toggleModal('admin-login-modal', false); openAdmin(); }
            else { document.getElementById('admin-error').style.display = 'block'; }
        }

        window.openAdmin = () => {
            document.getElementById('home-view').className = 'page-view home-inactive';
            document.getElementById('admin-view').className = 'page-view cat-active';
            
            // نمایش مقادیر قبلی لینک‌ها اگر وجود داشت
            document.getElementById('set-insta').value = window.dbSettings.insta || '';
            document.getElementById('set-snapp').value = window.dbSettings.snapp || '';
            document.getElementById('set-tapsi').value = window.dbSettings.tapsi || '';
            
            renderAdmin();
        }

        window.closeAdmin = () => { document.getElementById('admin-view').className = 'page-view cat-hidden'; document.getElementById('home-view').className = 'page-view home-active'; }

        window.handleFile = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                tempImage = ev.target.result;
                document.getElementById('preview-box').style.display = 'flex';
                document.getElementById('preview-img').src = tempImage;
            };
            reader.readAsDataURL(file);
        }

        window.adminSaveProduct = async () => {
            const fa = document.getElementById('add-fa').value;
            const price = parseInt(document.getElementById('add-price').value);
            
            if(!fa || !price) return alert("نام فارسی و قیمت الزامی است");

            const pData = {
                cat: document.getElementById('add-cat').value,
                fa: fa,
                en: document.getElementById('add-en').value || fa,
                tr: document.getElementById('add-tr').value || fa,
                ar: document.getElementById('add-ar').value || fa,
                price: price,
                desc: document.getElementById('add-desc').value,
                img: tempImage,
                avail: true,
                timestamp: Date.now()
            };

            try {
                // ارسال مستقیم به دیتابیس شما
                await addDoc(collection(db, 'darbari_products'), pData);
                alert("محصول با موفقیت در دیتابیس ذخیره شد.");
                
                // پاک کردن فرم
                document.querySelectorAll('.admin-input').forEach(i => {
                    if(!i.id.startsWith('set-') && i.id !== 'admin-password') i.value = '';
                });
                tempImage = ""; document.getElementById('preview-box').style.display = 'none';
            } catch(e) {
                console.error(e);
                alert("خطا در ذخیره سازی! لطفا قدم اول (تنظیم Rules دیتابیس) را انجام داده باشید.");
            }
        }

        window.renderAdmin = () => {
            const list = document.getElementById('admin-list');
            list.innerHTML = '';
            window.dbProducts.sort((a,b) => b.timestamp - a.timestamp).forEach(p => {
                list.innerHTML += `
                    <div class="admin-product-card" style="opacity: ${p.avail ? '1' : '0.5'}">
                        <div><b>${p.fa}</b><br><small>${window.formatPrice(p.price)}T</small></div>
                        <div style="display:flex; gap:5px;">
                            <button class="admin-btn" style="padding:5px 10px; background:${p.avail?'#ff9500':'#21aa58'}" onclick="adminToggle('${p.fbId}', ${p.avail})">${p.avail?'ناموجود':'موجود'}</button>
                            <button class="admin-btn" style="padding:5px 10px; background:#ff453a; color:#fff" onclick="adminDel('${p.fbId}')">حذف</button>
                        </div>
                    </div>
                `;
            });
        }

        window.adminToggle = async (fbId, status) => { 
            await updateDoc(doc(db, 'darbari_products', fbId), { avail: !status }); 
        }
        
        window.adminDel = async (fbId) => { 
            if(confirm("آیا از حذف این آیتم مطمئن هستید؟")) {
                await deleteDoc(doc(db, 'darbari_products', fbId)); 
            }
        }

        window.adminSaveLinks = async () => {
            try {
                await setDoc(doc(db, 'darbari_settings', 'links'), {
                    insta: document.getElementById('set-insta').value,
                    snapp: document.getElementById('set-snapp').value,
                    tapsi: document.getElementById('set-tapsi').value
                });
                alert("لینک‌های ارتباطی با موفقیت در سرور ذخیره شدند.");
            } catch(e) {
                alert("خطا در ذخیره لینک‌ها");
            }
        }

        window.toggleModal = (id, show) => { document.getElementById(id).classList[show?'add':'remove']('active'); }
        window.closeModal = (id, e) => { if(!e || e.target.id === id) toggleModal(id, false); }
        
        window.openAbout = () => {
            // وقتی درباره ما باز میشه، مطمئن میشیم لینک ها به دکمه ها متصل شدن
            document.getElementById('link-insta').onclick = () => { if(window.dbSettings.insta) window.open(window.dbSettings.insta, '_blank'); };
            document.getElementById('link-snapp').onclick = () => { if(window.dbSettings.snapp) window.open(window.dbSettings.snapp, '_blank'); };
            document.getElementById('link-tapsi').onclick = () => { if(window.dbSettings.tapsi) window.open(window.dbSettings.tapsi, '_blank'); };
            
            toggleModal('about-modal', true);
        }

        // شروع نرم‌افزار
        start();
    </script>
</body>
</html>
